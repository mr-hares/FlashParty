prefix: "&7(<gradient:#96FB57:#70FFC3>FlashParty</gradient>) &r"
not-permission: "{prefix}У вас <gradient:#96FB57:#70FFC3>недостаточно прав &fдля выполнения данной команды"

# Help
help:
  command-list:
    - ""
    - "{prefix}Список доступных команд"
    - "&7/party create [название] - создание новой пати"
    - "&7/party invite [ник] - пригласить игрока в пати"
    - "&7/party list - список активных пати"
    - "&7/party info - информация о пати"
    - "&7/party leave - покинуть пати"
    - "&7/party accept - принять приглашение в пати"
    - "&7/party deny - отклонить приглашения в пати"
    - "&7/party tag [цвет] [тег] - добавить тег пати"
    - "&7/party rename [название] - переименовать название пати"
    - "&7/party kick [ник] - исключить игрока из пати"
    - "&7/party rank [ник] [ранг] - изменить ранг участника пати"
    - ""

  use-create: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party create [название]"
  use-invite: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party invite [ник]"
  use-tag: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party tag [цвет] [тег]"
  use-rename: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party rename [название]"
  use-kick: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party kick [ник]"
  use-rank: "{prefix}Используйте: <gradient:#96FB57:#70FFC3>/party rank [ник] [ранг]"

# Main
in-party: "{prefix}Вы <gradient:#96FB57:#70FFC3>уже находитесь &fв какой-то пати"
not-in-party: "{prefix}Вы <gradient:#96FB57:#70FFC3>не находитесь &fв какой-либо пати"
player-in-party: "{prefix}Игрок <gradient:#96FB57:#70FFC3>уже находитесь &fв какой-то пати"
player-not-in-party: "{prefix}Игрок <gradient:#96FB57:#70FFC3>не находитесь &fв вашей пати"

not-rank: "{prefix}Ваш ранг <gradient:#96FB57:#70FFC3>не позволяет использовать &fданную функцию"
not-found-player: "{prefix}Указанный вами игрок <gradient:#96FB57:#70FFC3>не найден"

with-myself: "{prefix}Вы <gradient:#96FB57:#70FFC3>не можете &fвзаимодействовать с самим собой"

max-party: "{prefix}На сервере <gradient:#96FB57:#70FFC3>достигнут &fлимит пати"
max-players: "{prefix}Вы #4dff4dдостигли &fлимита участников в одном пати"

# =================== PARTY COMMAND ===================

# /party create
name-is-long: "{prefix}Название пати <gradient:#96FB57:#70FFC3>не должно быть &fбольше <gradient:#96FB57:#70FFC3>{max_length} &fсимволов"
name-is-short: "{prefix}Название пати <gradient:#96FB57:#70FFC3>должно быть &fбольше <gradient:#96FB57:#70FFC3>{min_length} &fсимволов"
name-is-occupied: "{prefix}Данное название пати <gradient:#96FB57:#70FFC3>уже занято &fкем-то"

party-create: "{prefix}Вы <gradient:#96FB57:#70FFC3>успешно создали &fновое пати {name}"

# /party invite
is-invite: "{prefix}У данное игрока уже есть активное предложение"
invited: "{prefix}Вы <gradient:#96FB57:#70FFC3>отправили &fприглашение на вступление в пати игроку <gradient:#96FB57:#70FFC3>{player}"
invite-notify: "{prefix}Игрок <gradient:#96FB57:#70FFC3>{player} &fприглашает вас <gradient:#96FB57:#70FFC3>вступить &fв пати {party}\n<click:run_command:/party accept><hover:show_text:Принять предложение>[ принять ]</hover></click> <click:run_command:/party deny><hover:show_text:Отклонить предложение>[ отклонить ]</hover></click>"

# /party accept/deny
not-offers: "{prefix}У вас <gradient:#96FB57:#70FFC3>нет активных &fпредложений"
accept: "{prefix}Вы <gradient:#96FB57:#70FFC3>приняли &fпредложение на вступление в пати"
accept-notify: "{prefix}Игрок <gradient:#96FB57:#70FFC3>{player} &fпринял ваше предложение"
deny: "{prefix}Вы <gradient:#96FB57:#70FFC3>отклонили &fпредложение на вступление в пати"
deny-notify: "{prefix}Игрок <gradient:#96FB57:#70FFC3>{player} &fотклонил ваше предложение"

# /party leave
leave: "{prefix}Вы <gradient:#96FB57:#70FFC3>покинули &fпати по собственному желанию"
leave-owner: "{prefix}Создатель пати <gradient:#96FB57:#70FFC3>покинул &fеё по собственному желанию. Пати <gradient:#96FB57:#70FFC3>удалено"

# /party rename
rename: "{prefix}Вы <gradient:#96FB57:#70FFC3>изменили &fназвание своего пати"

# /party tag
tag-is-long: "{prefix}ТЕГ пати <gradient:#96FB57:#70FFC3>не должно быть &fбольше <gradient:#96FB57:#70FFC3>{max_length} &fсимволов"
tag-is-short: "{prefix}ТЕГ пати <gradient:#96FB57:#70FFC3>должно быть &fбольше <gradient:#96FB57:#70FFC3>{min_length} &fсимволов"
tag-add: "{prefix}Вы <gradient:#96FB57:#70FFC3>добавили &fТЕГ пати"
tag-remove: "{prefix}Вы <gradient:#96FB57:#70FFC3>удалили &fТЕГ пати"

# /party kick
kick-player: "{prefix}Вы <gradient:#96FB57:#70FFC3>исключили &fиз пати игрока <gradient:#96FB57:#70FFC3>{player}"
kick-notify: "{prefix}Вас <gradient:#96FB57:#70FFC3>исключили &fиз пати {party}"

# /party list
list-empty: "{prefix}Список активных пати пуст"
list-header: "{prefix}Список активных пати"
list-item: "<gradient:#96FB57:#70FFC3>- &r{name} <gradient:#96FB57:#70FFC3>(Участников: {members}) <gradient:#96FB57:#70FFC3>| &rТЕГ: {tag}"

# /party rank
not-found-rank: "{prefix}Указанный вами ранг <gradient:#96FB57:#70FFC3>не найден"
already-have-rank: "{prefix}Участник уже находится на данном ранге"
edit-rank: "{prefix}Вы <gradient:#96FB57:#70FFC3>изменили &fранг <gradient:#96FB57:#70FFC3>{player} &fна <gradient:#96FB57:#70FFC3>{rank}"
edit-rank-notify: "{prefix}Вам ранг <gradient:#96FB57:#70FFC3>был изменён &fна <gradient:#96FB57:#70FFC3>{rank}"

# /party info
party-info:
  - ""
  - "<gradient:#96FB57:#70FFC3>---- &fИнформация о партии {party} <gradient:#96FB57:#70FFC3>----"
  - "&fОснователь: <gradient:#96FB57:#70FFC3>{owner}"
  - "&fЗаместители: <gradient:#96FB57:#70FFC3>{deputies}"
  - "&fТЭГ: {tag}"
  - "&fУчастники: <gradient:#96FB57:#70FFC3>{members}"
  - ""

# =================== FP COMMAND ===================

# /fp reload
reload: "{prefix}Конфигурация плагина <gradient:#96FB57:#70FFC3>перезагружена"

# /fp remove
not-found-party: "{prefix}Указанное пати <gradient:#96FB57:#70FFC3>не найдено"
remove: "{prefix}Вы <gradient:#96FB57:#70FFC3>удалили &fпати {party}"
remove-notify: "{prefix}Пати {party} было <gradient:#96FB57:#70FFC3>удалено &fадминистрацией сервера"